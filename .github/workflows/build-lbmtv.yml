name: build-and-test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC developer command prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build all examples
        shell: cmd
        run: scripts\build_all.cmd

      - name: Run smoke test
        shell: cmd
        run: scripts\smoke_test.cmd